<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <linearGradient id="cost" x1="140" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="0.45" stop-color="#d29922"/>
      <stop offset="1" stop-color="#f85149"/>
    </linearGradient>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#8b949e"/>
    </marker>
    <marker id="sl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M9,0 L0,4 L9,8 Z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="960" height="470" fill="#0d1117"/>

  <!-- cheap zone -->
  <rect x="100" y="55" width="410" height="317" fill="#3fb950" opacity="0.08"/>
  <line x1="510" y1="55" x2="510" y2="372" stroke="#3fb950" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  <text x="116" y="80" fill="#3fb950" font-size="13" font-weight="600">zona barata · atrapá el defecto acá</text>

  <!-- axes -->
  <line x1="100" y1="55" x2="100" y2="372" stroke="#30363d" stroke-width="1.5"/>
  <line x1="100" y1="372" x2="912" y2="372" stroke="#30363d" stroke-width="1.5"/>
  <text transform="translate(30,214) rotate(-90)" text-anchor="middle" fill="#8b949e" font-size="13">costo de corregir el defecto ↑</text>

  <!-- cost curve -->
  <path d="M140,340 C170,338 202,333 232.5,330 C263,328 294,323 325,318 C356,313 387,307 417.5,300 C448,293 479,283 510,272 C541,261 572,248 602.5,230 C633,212 664,196 695,175 C726,154 757,140 787.5,120 C818,100 849,89 880,78"
        fill="none" stroke="url(#cost)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- x category labels -->
  <g font-size="13" text-anchor="middle" fill="#8b949e">
    <text x="140" y="392">Idea</text>
    <text x="232.5" y="392">Spec</text>
    <text x="325" y="392">Plan</text>
    <text x="417.5" y="392">Tasks</text>
    <text x="510" y="392">Analyze</text>
    <text x="602.5" y="392">Build</text>
    <text x="695" y="392">Verify</text>
    <text x="787.5" y="392">Review</text>
    <text x="880" y="392" fill="#f85149" font-weight="700">Prod</text>
  </g>

  <!-- conductual gates (solid ring) -->
  <g>
    <circle cx="232.5" cy="330" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="232.5" y="314" text-anchor="middle" fill="#c9d1d9" font-size="12.5" font-weight="600">AC + [VERIFICAR]</text>

    <circle cx="510" cy="272" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="510" y="256" text-anchor="middle" fill="#c9d1d9" font-size="12.5" font-weight="600" font-family="'SFMono-Regular',Consolas,monospace">/analyze</text>

    <circle cx="695" cy="175" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="695" y="159" text-anchor="middle" fill="#c9d1d9" font-size="12.5" font-weight="600" font-family="'SFMono-Regular',Consolas,monospace">/verify</text>

    <circle cx="787.5" cy="120" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="787.5" y="104" text-anchor="middle" fill="#c9d1d9" font-size="12.5" font-weight="600">bug-finder</text>
  </g>

  <!-- deterministic gate (dashed ring) -->
  <circle cx="417.5" cy="300" r="6.5" fill="#0d1117" stroke="#58a6ff" stroke-width="2" stroke-dasharray="3 2.5"/>
  <text x="417.5" y="284" text-anchor="middle" fill="#c9d1d9" font-size="12.5" font-weight="600">validate-specs</text>
  <path d="M455,330 L427,306" stroke="#8b949e" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#ah)"/>
  <text x="460" y="334" fill="#8b949e" font-size="11">CI lo corre antes de mergear</text>

  <!-- legend -->
  <g>
    <circle cx="360" cy="74" r="5.5" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="374" y="78" fill="#c9d1d9" font-size="12">gate conductual — la IA / el humano valida</text>
    <circle cx="360" cy="96" r="5.5" fill="#0d1117" stroke="#58a6ff" stroke-width="2" stroke-dasharray="3 2.5"/>
    <text x="374" y="100" fill="#c9d1d9" font-size="12">gate determinístico — validate-specs en CI</text>
  </g>

  <!-- shift-left arrow -->
  <line x1="815" y1="448" x2="170" y2="448" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#sl)"/>
  <text x="492" y="438" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">SHIFT-LEFT · empujá cada gate a la izquierda — de conductual a determinístico</text>
</svg>
